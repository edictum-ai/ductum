    prompt: "Decision Trace: 053, 058, 059, 060, 108.\n## Behavior Contract\n- CLI/API runtime blockers must fail loudly with operator-visible evidence.\n- Run and task state must preserve explicit evidence and must not silently infer outcomes.\n## Verification\n- Run the task verification commands and git diff --check.\n## Drift Handling\n- Record a Ductum Decision before expanding scope or crossing non-goals.\n## Slop Review\n- Attack fake abstraction, dead config, duplicate routing logic, and future features.\n- Confirm explicit evidence and behavioral tests cover missing or invalid inputs.\nTask: Fix clean first-run onboarding. Known blockers: scripts-disabled installs can leave better-sqlite3 unbuilt, default config must be generic, and pnpm serve must bootstrap DUCTUM_OPERATOR_TOKEN."
