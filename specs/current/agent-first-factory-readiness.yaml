project: ductum
spec:
  name: agent-first-factory-readiness
  status: approved
  maxFixIterations: 6
  document: |
    Turn Ductum into a working agent-first factory, not a diary or demo shell.

    ## Decision Trace
    - decisions/052: Pi is future harness substrate, not the default today.
    - decisions/053: Use Specs, Tasks, Runs, Decisions, Evidence; no Operation or WorkOrder.
    - decisions/054: Harnesses become pluggable adapters with canonical events.
    - decisions/055: Notification channels transport decisions; they do not make policy.
    - decisions/056: Sandboxing is a first-class resource.
    - decisions/058: Reference systems are pattern libraries, not feature checklists.
    - decisions/059: Design-to-implementation uses existing Ductum records.
    - decisions/060: No silent decision drift.
    - decisions/108: Execution integrity must be operator-visible and explicit.

    ## Behavior Contract
    - CLI/API runtime blockers must fail loudly with operator-visible evidence.
    - Run and task state must preserve explicit evidence and must not silently infer outcomes.
    - Missing credentials may block dispatch, but the blocker must be actionable.

    ## Verification
    - Import this spec through Ductum.
    - Run operator brief, queue, integrity, build, tests, and diff checks.

    ## Drift Handling
    - Record a Ductum Decision before crossing a non-goal or expanding scope.

    ## Slop Review
    - Attack fake abstraction, dead config, duplicate routing logic, and future features.
    - Confirm explicit evidence and behavioral tests cover missing or invalid inputs.
