apiVersion: edictum/v1alpha1
kind: WorkflowProfile
metadata:
  name: {{PROJECT_SLUG}}
  description: Node/TypeScript single-package profile for {{PROJECT_SLUG}} runs

context:
  required_files:
    - README.md
    - CLAUDE.md            # or AGENTS.md / .github/copilot-instructions.md
  optional_files:
    - package.json
    - tsconfig.json

setup:
  commands:
    # Pick the one that matches the lockfile:
    - pnpm install --frozen-lockfile
    # - npm ci
    # - yarn install --immutable
    # - bun install --frozen-lockfile

verify:
  commands:
    # Match CI. Common patterns:
    - pnpm lint
    - pnpm typecheck
    - pnpm test
    # or for vitest:
    # - pnpm vitest run
    # or for jest:
    # - pnpm jest --ci

review:
  approval_message: |
    Approve only after the review task returns PASS. Agents must never
    push the branch — the factory's post-completion pipeline handles merge.

push:
  protected_branches:
    - main
    - master
  allowed_git_commands:
    - git status
    - git diff
    - git add
    - git commit
    - git log
    - git show
    - git branch
