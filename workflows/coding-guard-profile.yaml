apiVersion: edictum/v1alpha1
kind: WorkflowProfile
metadata:
  name: coding-guard
  description: Built-in guarded coding workflow profile

context:
  required_files:
    - workflows/coding-guard-profile.yaml
  optional_files:
    - AGENTS.md
    - README.md

setup:
  commands:
    - pnpm install --frozen-lockfile

preflight:
  packageManager: pnpm
  runtime:
    name: node
    minVersion: "22.0.0"
  dependencies:
    packageManager: pnpm
    lockfile: pnpm-lock.yaml
    installDir: node_modules
  worktree:
    writable: true
    expect: clean
  nativeTools:
    - git

verify:
  commands:
    - pnpm build
    - pnpm test

review:
  approval_message: Approve only after external review reports no new issues

push:
  protected_branches:
    - main
  allowed_git_commands:
    - git status
    - git diff
    - git add
    - git commit
