apiVersion: edictum/v1alpha1
kind: WorkflowProfile
metadata:
  name: {{PROJECT_SLUG}}
  description: Rust project profile for {{PROJECT_SLUG}} runs

context:
  required_files:
    - README.md
    - CLAUDE.md            # or AGENTS.md / .github/copilot-instructions.md
  optional_files:
    - Cargo.toml

setup:
  commands:
    - cargo fetch --locked

verify:
  commands:
    - cargo fmt --check
    - cargo clippy --all-targets -- -D warnings
    - cargo test --all-features

review:
  approval_message: |
    Approve only after the review task returns PASS. Agents must never
    push the branch — the factory's post-completion pipeline handles merge.

push:
  protected_branches:
    - main
    - master
  allowed_git_commands:
    - git status
    - git diff
    - git add
    - git commit
    - git log
    - git show
    - git branch
