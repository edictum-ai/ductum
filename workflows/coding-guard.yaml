apiVersion: edictum/v1
kind: Workflow
metadata:
  name: coding-guard
  version: "2026-04-06"
  description: 3-stage agent workflow — understand, implement, ship

stages:
  - id: understand
    description: Read the task brief, repo guidance, and relevant code before editing
    tools: [Read, Grep, Glob, Bash]
    checks:
      - command_not_matches: '(?:^|(?:&&|\|\||;|\n)\s*)git\s+(?:add|commit|push)\b'
        message: No git writes during understand — read only
      - command_not_matches: '(?:^|(?:&&|\|\||;|\n)\s*)(?:rm|mv)\s+'
        message: No destructive commands during understand
    exit:
      - condition: file_read("README.md")
        message: Read README.md before editing

  - id: implement
    description: Make changes, verify locally, review your diff
    entry:
      - condition: stage_complete("understand")
    tools: [Read, Grep, Glob, Edit, Write, Bash]
    checks:
      - command_not_matches: '(?:^|(?:&&|\|\||;|\n)\s*)git\s+push\b'
        message: Remote publication belongs to Ductum
      - command_not_matches: '(?:^|(?:&&|\|\||;|\n)\s*)git\s+push\b.*(?:\s|:)(?:main|master)(?:\s|$)'
        message: Never push directly to main or master

  - id: ship
    description: Factory-controlled ship boundary after verification and review
    entry:
      - condition: stage_complete("implement")
    tools: [Read, Grep, Bash]
    approval:
      message: Approve only after external review reports no new issues
    checks:
      - command_matches: '(?:^|(?:&&|\|\||;|\n)\s*)(?:git\s+(?:status|diff|add|commit|log|show)\b|gh\s+pr\s+(?:view|status|diff|checks)\b|gh\s+run\s+(?:view|list)\b|pnpm\b|npm\b|yarn\b)'
        message: Only git, gh, and build/test commands in ship
      - command_not_matches: '(?:^|(?:&&|\|\||;|\n)\s*)git\s+push\b.*(?:\s|:)(?:main|master)(?:\s|$)'
        message: Remote publication belongs to Ductum

  - id: done
    description: All workflow stages complete
    entry:
      - condition: stage_complete("ship")
