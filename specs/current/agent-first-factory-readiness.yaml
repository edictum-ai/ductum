    prompt: "Decision Trace: 053, 056, 058, 081, 108.\n## Behavior Contract\n- Ductum-managed agents must use CLI/API/MCP-supported flows for factory state.\n- A worktree run must not read or mutate the live factory SQLite database through shell commands.\n- Unsupported sandbox claims must fail loudly with operator-visible evidence.\n- CLI/API output must expose the supported next command when an agent needs factory state.\n## Verification\n- Add tests proving Bash authorization rejects the configured factory SQLite DB path, sidecars, and `DUCTUM_DB_PATH` references.\n- Run `pnpm --filter @ductum/core test -- enforce`.\n- Run `pnpm --filter @ductum/api test -- harness-loader`.\n- Run `pnpm build`, `pnpm test`, and `git diff --check`.\n## Drift Handling\n- Record a Ductum Decision before expanding scope or crossing non-goals.\n## Slop Review\n- Attack direct sqlite3 access, path traversal from worktrees, sidecar DB reads, and prompt-only sandbox claims.\nTask: Close the dogfooded boundary gap where run JUbYMoiM7gKk inspected `/Users/acartagena/project/ductum/ductum.db` through shell commands from a Ductum-managed worktree."
